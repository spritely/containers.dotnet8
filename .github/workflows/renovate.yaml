name: Renovate

on:
  workflow_dispatch:
  # Daily at 1:50AM EST (6:50AM UTC), with a second run at 1:55AM EST (7:55AM UTC)
  # Tier 6 dependency: build -> actions.test-dotnet -> containers.dotnet10 -> actions.publish-container -> actions.semantic-version -> containers.base
  # Run 1 creates PRs, CI validates, Run 2 auto-merges 5 minutes apart.
  schedule:
    - cron: '50 6 * * *'
    - cron: '55 6 * * *'

jobs:
  renovate:
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token
        id: renovate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Renovate
        uses: renovatebot/github-action@eb932558ad942cccfd8211cf535f17ff183a9f74 # v46.1.9
        with:
          token: ${{ steps.renovate-token.outputs.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: false
